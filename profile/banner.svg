<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000719"/>
      <stop offset="50%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#132C5C"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00B0FF"/>
      <stop offset="100%" style="stop-color:#FF6240"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00B0FF;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#FF6240;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#00B0FF" stroke-width="0.5" fill="none">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="120" y1="0" x2="120" y2="300"/>
    <line x1="240" y1="0" x2="240" y2="300"/>
    <line x1="360" y1="0" x2="360" y2="300"/>
    <line x1="480" y1="0" x2="480" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="720" y1="0" x2="720" y2="300"/>
    <line x1="840" y1="0" x2="840" y2="300"/>
    <line x1="960" y1="0" x2="960" y2="300"/>
    <line x1="1080" y1="0" x2="1080" y2="300"/>
  </g>

  <!-- Decorative circuit/node elements - left side -->
  <g opacity="0.12">
    <!-- Nodes -->
    <circle cx="80" cy="80" r="3" fill="#00B0FF"/>
    <circle cx="160" cy="140" r="4" fill="#00B0FF"/>
    <circle cx="100" cy="200" r="3" fill="#00B0FF"/>
    <circle cx="200" cy="220" r="2.5" fill="#00B0FF"/>
    <circle cx="60" cy="160" r="2" fill="#00B0FF"/>
    <!-- Connections -->
    <line x1="80" y1="80" x2="160" y2="140" stroke="#00B0FF" stroke-width="0.8"/>
    <line x1="160" y1="140" x2="100" y2="200" stroke="#00B0FF" stroke-width="0.8"/>
    <line x1="100" y1="200" x2="200" y2="220" stroke="#00B0FF" stroke-width="0.8"/>
    <line x1="60" y1="160" x2="160" y2="140" stroke="#00B0FF" stroke-width="0.8"/>
  </g>

  <!-- Decorative circuit/node elements - right side -->
  <g opacity="0.12">
    <circle cx="1020" cy="70" r="3" fill="#FF6240"/>
    <circle cx="1100" cy="120" r="4" fill="#FF6240"/>
    <circle cx="1060" cy="200" r="3" fill="#FF6240"/>
    <circle cx="1140" cy="180" r="2.5" fill="#FF6240"/>
    <circle cx="1000" cy="230" r="2" fill="#FF6240"/>
    <line x1="1020" y1="70" x2="1100" y2="120" stroke="#FF6240" stroke-width="0.8"/>
    <line x1="1100" y1="120" x2="1060" y2="200" stroke="#FF6240" stroke-width="0.8"/>
    <line x1="1100" y1="120" x2="1140" y2="180" stroke="#FF6240" stroke-width="0.8"/>
    <line x1="1060" y1="200" x2="1000" y2="230" stroke="#FF6240" stroke-width="0.8"/>
  </g>

  <!-- Accent line -->
  <rect x="350" y="148" width="500" height="2" rx="1" fill="url(#accent)" opacity="0.6"/>

  <!-- Company name -->
  <text x="600" y="125" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="700" fill="#FFFFFF" letter-spacing="2">
    MERCHANT PROTOCOL
  </text>

  <!-- Tagline -->
  <text x="600" y="185" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#8899BB" letter-spacing="4" font-weight="300">
    AI AGENTS &amp; PRODUCTION INFRASTRUCTURE
  </text>

  <!-- Three pillars -->
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#4A6FA5" letter-spacing="2" text-anchor="middle">
    <text x="400" y="235">AGENTS</text>
    <text x="600" y="235">INFRASTRUCTURE</text>
    <text x="800" y="235">MARTECH</text>
  </g>

  <!-- Pillar dots -->
  <circle cx="400" cy="248" r="2" fill="#00B0FF" opacity="0.6"/>
  <circle cx="600" cy="248" r="2" fill="#00B0FF" opacity="0.6"/>
  <circle cx="800" cy="248" r="2" fill="#FF6240" opacity="0.6"/>

  <!-- Connecting line between pillars -->
  <line x1="402" y1="248" x2="598" y2="248" stroke="#1a3a6a" stroke-width="0.5"/>
  <line x1="602" y1="248" x2="798" y2="248" stroke="#1a3a6a" stroke-width="0.5"/>

  <!-- Top and bottom accent borders -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#accent)" opacity="0.4"/>
  <rect x="0" y="298" width="1200" height="2" fill="url(#accent)" opacity="0.4"/>
</svg>
